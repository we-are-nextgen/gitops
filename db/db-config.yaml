    create table Activity (
    create_date timestamp(6),
    update_date timestamp(6),
    id uuid not null,
    created_by varchar(255),
    description varchar(255),
    name varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table Badge (
    create_date timestamp(6),
    update_date timestamp(6),
    id uuid not null,
    category varchar(255) check ((category in ('MILESTONE','STAGE','SKILL','COMMUNITY','JOURNEY','SPECIAL'))),
    created_by varchar(255),
    icon varchar(255),
    level varchar(255) check ((level in ('NONE','BRONZE','SILVER','GOLD'))),
    name varchar(255),
    rarity varchar(255),
    rule_type varchar(255) check ((rule_type in ('COMPLETE_PROFILE','ENROLL_TO_TRACK','ENROLL_TO_LAB','COMPLETE_TRACK','COMPLETE_LAB','COMPLETE_MILESTONE','COMPLETE_ALL_MILESTONES_IN_STAGE','COMPLETE_STAGE','COMPLETE_JOURNEY','POINTS_REACHED'))),
    rule_value varchar(255),
    title varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table bootcamp (
    capacity integer,
    durationWeeks integer,
    expected_start_date date,
    create_date timestamp(6),
    update_date timestamp(6),
    id uuid not null,
    mentor_id uuid,
    badge_rule_value varchar(255),
    created_by varchar(255),
    description varchar(255),
    name varchar(255),
    updated_by varchar(255),
    version varchar(255),
    primary key (id)
    );


    create table Bootcamp_audience (
    Bootcamp_id uuid not null,
    audience varchar(255)
    );


    create table Bootcamp_outcomes (
    Bootcamp_id uuid not null,
    outcomes varchar(255)
    );


    create table bootcamp_progress (
    progress_percentage integer not null,
    completed_at timestamp(6) with time zone,
    create_date timestamp(6),
    earned_points bigint,
    update_date timestamp(6),
    bootcamp_start_id uuid not null,
    id uuid not null,
    created_by varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table bootcamp_start (
    create_date timestamp(6),
    started_at timestamp(6) with time zone not null,
    update_date timestamp(6),
    bootcamp_id uuid,
    id uuid not null,
    user_id uuid,
    cohort_name varchar(255),
    created_by varchar(255),
    status varchar(255) check ((status in ('OPEN_FOR_ENROLLMENT','SARTED','KICKOFF','ORIENTATION','CORE_MODULES','PRACTICE_MODULES','COMPLETED'))),
    updated_by varchar(255),
    primary key (id)
    );


    create table Component (
    create_date timestamp(6),
    update_date timestamp(6),
    id uuid not null,
    module_id uuid,
    created_by varchar(255),
    reference varchar(255),
    type varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table Domain (
    create_date timestamp(6),
    update_date timestamp(6),
    id uuid not null,
    community varchar(255),
    created_by varchar(255),
    description varchar(255),
    icon varchar(255),
    name varchar(255),
    tags varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table domain_profiles (
    domain_id uuid not null,
    profile_id uuid not null
    );


    create table Exercise (
    points integer,
    create_date timestamp(6),
    update_date timestamp(6),
    id uuid not null,
    lab_id uuid,
    correctAnswer TEXT,
    created_by varchar(255),
    hint TEXT,
    optionsJson TEXT,
    question TEXT,
    title varchar(255),
    type varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table exercise_submission (
    correct boolean not null,
    earnedPoints integer,
    create_date timestamp(6),
    submitted_at timestamp(6),
    update_date timestamp(6),
    exercise_id uuid,
    id uuid not null,
    user_id uuid,
    answer TEXT,
    created_by varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table ITProfessional (
    create_date timestamp(6),
    update_date timestamp(6),
    domain_id uuid,
    id uuid not null,
    profile_id uuid,
    stage_id uuid,
    bio varchar(255),
    created_by varchar(255),
    fullName varchar(255),
    headline varchar(255),
    location varchar(255),
    photoUrl varchar(255),
    updated_by varchar(255),
    userId varchar(255),
    primary key (id)
    );


    create table Journey (
    create_date timestamp(6),
    update_date timestamp(6),
    id uuid not null,
    created_by varchar(255),
    description varchar(255),
    name varchar(255),
    tags varchar(255),
    title varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table Lab (
    difficulty_level smallint check ((difficulty_level between 0 and 2)),
    estimated_time_min integer,
    has_bonus_tasks boolean,
    sequence integer,
    create_date timestamp(6),
    update_date timestamp(6),
    id uuid not null,
    url varchar(2048),
    youtube varchar(2048),
    badge_rule_value varchar(255),
    content_html varchar(255),
    content_html_url varchar(255),
    content_markdown varchar(255),
    content_markdown_url varchar(255),
    created_by varchar(255),
    description varchar(255),
    icon varchar(255),
    language varchar(255),
    name varchar(255) not null,
    updated_by varchar(255),
    uuid varchar(255),
    primary key (id)
    );


    create table lab_asset (
    create_date timestamp(6),
    update_date timestamp(6),
    id uuid not null,
    lab_id uuid,
    created_by varchar(255),
    path varchar(255),
    type varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table lab_progress (
    completed boolean,
    progress_id uuid not null,
    lab_id varchar(255) not null,
    primary key (progress_id, lab_id)
    );


    create table Layer (
    create_date timestamp(6),
    update_date timestamp(6),
    bootcamp_id uuid,
    id uuid not null,
    created_by varchar(255),
    name varchar(255),
    type varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table layer_progress (
    completed boolean not null,
    create_date timestamp(6),
    earned_points bigint,
    update_date timestamp(6),
    bootcamp_progress_id uuid not null,
    id uuid not null,
    layer_id uuid not null,
    comments varchar(255),
    created_by varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table Learning_track (
    difficulty_level smallint check ((difficulty_level between 0 and 2)),
    estimated_time_min integer,
    reward_points integer,
    create_date timestamp(6),
    update_date timestamp(6),
    domain_id uuid,
    id uuid not null,
    badge_rule_value varchar(255),
    created_by varchar(255),
    description TEXT,
    icon varchar(255),
    name varchar(255) not null,
    repoBranch varchar(255),
    repoPath varchar(255),
    repoUrl varchar(255),
    updated_by varchar(255),
    uuid varchar(255),
    primary key (id)
    );


    create table learning_track_labs (
    lab_id uuid not null,
    learning_track_id uuid not null
    );


    create table learning_track_profiles (
    learning_track_id uuid not null,
    profile_id uuid not null
    );


    create table Milestone (
    required_points integer,
    sequence integer,
    skippable boolean,
    create_date timestamp(6),
    update_date timestamp(6),
    id uuid not null,
    stage_id uuid,
    badge_rule_value varchar(255),
    created_by varchar(255),
    description varchar(255),
    name varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table milestone_activity (
    activity_id uuid not null,
    milestone_id uuid not null
    );


    create table Module (
    create_date timestamp(6),
    update_date timestamp(6),
    id uuid not null,
    layer_id uuid,
    badge_rule_value varchar(255),
    created_by varchar(255),
    description varchar(255),
    moduleId varchar(255),
    name varchar(255),
    type varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table Module_linkedLabs (
    Module_id uuid not null,
    linkedLabs varchar(255)
    );


    create table Module_objectives (
    Module_id uuid not null,
    objectives varchar(255)
    );


    create table module_progress (
    completed boolean not null,
    create_date timestamp(6),
    earned_points bigint,
    update_date timestamp(6),
    bootcamp_progress_id uuid not null,
    id uuid not null,
    layer_progress_id uuid not null,
    module_id uuid not null,
    comments varchar(255),
    created_by varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table Profile (
    create_date timestamp(6),
    update_date timestamp(6),
    id uuid not null,
    created_by varchar(255),
    description varchar(255),
    name varchar(255),
    skills varchar(255),
    tags varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table quiz_scores (
    score integer,
    progress_id uuid not null,
    module_id varchar(255) not null,
    primary key (progress_id, module_id)
    );


    create table Stage (
    sequence integer,
    create_date timestamp(6),
    update_date timestamp(6),
    id uuid not null,
    journey_id uuid,
    badge_rule_value varchar(255),
    created_by varchar(255),
    description varchar(255),
    icon varchar(255),
    name varchar(255),
    tags varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table Team (
    create_date timestamp(6),
    update_date timestamp(6),
    admin_user_id uuid,
    id uuid not null,
    created_by varchar(255),
    name varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table team_members (
    team_id uuid not null,
    user_id uuid not null
    );


    create table user_badges (
    create_date timestamp(6),
    earnedAt timestamp(6),
    update_date timestamp(6),
    badge_id uuid,
    id uuid not null,
    user_id uuid,
    created_by varchar(255),
    source varchar(255) check ((source in ('AUTO','MANUAL'))),
    updated_by varchar(255),
    primary key (id)
    );


    create table user_bootcamp (
    create_date timestamp(6),
    earned_points bigint,
    end_date timestamp(6),
    join_date timestamp(6),
    update_date timestamp(6),
    bootcamp_start_id uuid,
    id uuid not null,
    user_id uuid,
    created_by varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table user_lab_progress (
    completed boolean,
    completed_at timestamp(6),
    create_date timestamp(6),
    earned_points bigint,
    start_date timestamp(6),
    update_date timestamp(6),
    id uuid not null,
    lab_id uuid,
    track_id uuid,
    user_id uuid,
    created_by varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table user_profiles (
    profile_id uuid not null,
    user_id uuid not null
    );


    create table user_progress (
    closeDate timestamp(6),
    create_date timestamp(6),
    earned_points bigint,
    startDate timestamp(6),
    update_date timestamp(6),
    id uuid not null,
    milestone_id uuid,
    nextMilestone_id uuid,
    prevProgress_id uuid,
    user_id uuid,
    created_by varchar(255),
    status varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


    create table user_tracks (
    completed boolean,
    enrolled boolean,
    create_date timestamp(6),
    earned_points bigint,
    enrolled_at timestamp(6),
    finished_at timestamp(6),
    update_date timestamp(6),
    id uuid not null,
    learning_track_id uuid,
    user_id uuid,
    created_by varchar(255),
    updated_by varchar(255),
    primary key (id)
    );


