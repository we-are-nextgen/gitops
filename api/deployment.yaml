apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextgen-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextgen-api
  template:
    metadata:
      labels:
        app:nextgen-api
    spec:
      containers:
        - name: nextgen-api
          image: quay.io/wael2000/nextgen-api
          ports:
            - containerPort: 8080
          env:
            - name: USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: USERNAME
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: PASSWORD
            - name: POSTGRESQL
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRESQL
            - name: QUARKUS_PROFILE
              value: prod